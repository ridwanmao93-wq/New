# Render.com blueprint. Push this repo, create a new Blueprint service,
# then fill in the secret values in the Render dashboard.
services:
  - type: web
    name: performance-dashboard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: OURA_ACCESS_TOKEN
        sync: false
      - key: AIRTABLE_DAILY_HEALTH_TABLE
        value: Daily Health Metrics
      - key: AIRTABLE_CBT_MORNING_TABLE
        value: CBT Morning Entries
      - key: AIRTABLE_CBT_EVENING_TABLE
        value: CBT Evening Entries
      - key: AIRTABLE_WORKOUTS_TABLE
        value: Workouts
      - key: AIRTABLE_WEIGHT_TABLE
        value: Weight Tracking
      - key: AIRTABLE_HYDRATION_TABLE
        value: Hydration
      - key: AIRTABLE_WEEKLY_SCORECARD_TABLE
        value: Weekly Scorecard
      - key: CRON_ENABLED
        value: "true"
      - key: OURA_SYNC_CRON
        value: 0 6 * * *
